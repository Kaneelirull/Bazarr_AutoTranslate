services:
  lingarr:
    image: lingarr/lingarr:latest
    container_name: lingarr
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - lingarr_data:/app/config
    environment:
      - TZ=${TZ:-Europe/Tallinn}
    # GPU passthrough (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  bazarr-autotranslate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bazarr-autotranslate
    restart: unless-stopped
    depends_on:
      - lingarr
    environment:
      # Bazarr Connection (REQUIRED)
      - BAZARR_URL=${BAZARR_URL}
      - BAZARR_API_KEY=${BAZARR_API_KEY}

      # Languages to manage (comma-separated, order = source priority)
      - LANGUAGES=${LANGUAGES:-en,et,sv}

      # Lingarr Connection (REQUIRED)
      - LINGARR_URL=${LINGARR_URL:-http://lingarr:8080}
      - LINGARR_API_KEY=${LINGARR_API_KEY:-}

      # Timing
      - PARALLEL_TRANSLATES=${PARALLEL_TRANSLATES:-1}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-1200}
      - CONNECT_TIMEOUT=${CONNECT_TIMEOUT:-10}
      - POLL_INTERVAL=${POLL_INTERVAL:-20}
      - POLL_TIMEOUT=${POLL_TIMEOUT:-600}
      - RESUBMIT_COOLDOWN=${RESUBMIT_COOLDOWN:-3600}
      - SYNC_TIMEOUT=${SYNC_TIMEOUT:-600}
      - SYNC_POLL_INTERVAL=${SYNC_POLL_INTERVAL:-15}

      # Per-file + existing-library cleanup
      - CLEANUP_LANGUAGES=${CLEANUP_LANGUAGES:-et}
      - CLEANUP_SCAN_EXISTING=${CLEANUP_SCAN_EXISTING:-true}
      - CLEANUP_SCAN_INTERVAL=${CLEANUP_SCAN_INTERVAL:-21600}
      - CLEANUP_SCAN_DRY_RUN=${CLEANUP_SCAN_DRY_RUN:-false}
      - CLEANUP_ROOT=${CLEANUP_ROOT:-/media}
      - CLEANUP_ACTION=${CLEANUP_ACTION:-quarantine}
      - CLEANUP_QUARANTINE_DIR=${CLEANUP_QUARANTINE_DIR:-/config/quarantine}
      - CLEANUP_MIN_CONFIDENCE=${CLEANUP_MIN_CONFIDENCE:-0.70}
      - CLEANUP_MIN_CHARS=${CLEANUP_MIN_CHARS:-200}
      - CLEANUP_MAX_UNIQUE_RATIO=${CLEANUP_MAX_UNIQUE_RATIO:-0.15}
      - CLEANUP_MAX_CYRILLIC_RATIO=${CLEANUP_MAX_CYRILLIC_RATIO:-0.05}
      - CLEANUP_MAX_CJK_RATIO=${CLEANUP_MAX_CJK_RATIO:-0.05}
      - CLEANUP_MAX_LATIN_RATIO=${CLEANUP_MAX_LATIN_RATIO:-0.80}
      - CLEANUP_MIN_LETTERS_FOR_SCRIPT=${CLEANUP_MIN_LETTERS_FOR_SCRIPT:-20}
      - CLEANUP_MAX_CUE_LINES=${CLEANUP_MAX_CUE_LINES:-4}
      - CLEANUP_MAX_CUE_CHARS=${CLEANUP_MAX_CUE_CHARS:-500}
      - CLEANUP_MAX_EXPANSION_RATIO=${CLEANUP_MAX_EXPANSION_RATIO:-4.0}
      - CLEANUP_MAX_EXPANSION_CHARS=${CLEANUP_MAX_EXPANSION_CHARS:-300}
      - CLEANUP_MAX_SOURCE_SIMILARITY=${CLEANUP_MAX_SOURCE_SIMILARITY:-0.92}
      - CLEANUP_REPAIR_ENABLED=${CLEANUP_REPAIR_ENABLED:-true}
      - CLEANUP_MAX_REPAIR_ATTEMPTS=${CLEANUP_MAX_REPAIR_ATTEMPTS:-2}
      - CLEANUP_REPAIR_CONTEXT_LINES=${CLEANUP_REPAIR_CONTEXT_LINES:-5}

      # Retention
      - RETENTION_DAYS=${RETENTION_DAYS:-30}
      - RETENTION_CHECK_INTERVAL=${RETENTION_CHECK_INTERVAL:-3600}
      - LOG_DIR=${LOG_DIR:-/var/log/bazarr-autotranslate}

      - TZ=${TZ:-Europe/Tallinn}

    volumes:
      - ${MEDIA_PATH}:/media
      - ./logs:/var/log/bazarr-autotranslate
      - autotranslate_data:/config

    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  lingarr_data:
  autotranslate_data:
