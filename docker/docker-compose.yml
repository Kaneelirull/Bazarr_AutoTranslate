version: '3.8'

services:
  lingarr:
    image: lingarr/lingarr:latest
    container_name: lingarr
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - lingarr_data:/app/config
    environment:
      - TZ=${TZ:-Europe/Tallinn}
    # GPU passthrough (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  bazarr-autotranslate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bazarr-autotranslate
    restart: unless-stopped
    depends_on:
      - lingarr
    environment:
      # Bazarr Connection (REQUIRED)
      - BAZARR_URL=${BAZARR_URL}
      - BAZARR_API_KEY=${BAZARR_API_KEY}

      # Languages to manage (comma-separated, order = source priority)
      - LANGUAGES=${LANGUAGES:-en,et,sv}

      # Lingarr Connection (optional — enables queue tracking)
      - LINGARR_URL=${LINGARR_URL:-http://lingarr:8080}
      - LINGARR_API_KEY=${LINGARR_API_KEY:-}

      # Timing
      - PARALLEL_TRANSLATES=${PARALLEL_TRANSLATES:-1}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-1200}
      - CONNECT_TIMEOUT=${CONNECT_TIMEOUT:-10}
      - POLL_INTERVAL=${POLL_INTERVAL:-20}
      - POLL_TIMEOUT=${POLL_TIMEOUT:-600}

      # Cleanup (used by entrypoint.sh only)
      - CLEANUP_TIME=${CLEANUP_TIME:-04:00}
      - CLEANUP_ROOT=${CLEANUP_ROOT:-/media}
      - CLEANUP_MIN_CONFIDENCE=${CLEANUP_MIN_CONFIDENCE:-0.70}
      - CLEANUP_MIN_CHARS=${CLEANUP_MIN_CHARS:-200}

      - TZ=${TZ:-Europe/Tallinn}

    volumes:
      - ${MEDIA_PATH}:/media
      - ./logs:/var/log/bazarr-autotranslate

volumes:
  lingarr_data:
